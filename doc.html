<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon App de Notes</title>
    <style>
        /* === STYLE DE L'APPLICATION (CSS) === */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        </style>
<body>

    <h2>📝 Mes Notes</h2>

    <input type="text" id="searchBar" placeholder="🔍 Rechercher une note..." onkeyup="rechercherNotes()">

    <textarea id="noteInput" placeholder="Écrivez votre nouvelle note ici..."></textarea>
    <button onclick="ajouterNote()">Sauvegarder la note</button></body>
</html>
