<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="">
        <fieldset>
            <fieldset>
                <title>Formulaire d'inscription</title>
                <legend>Etat civil</legend>
                <p>
                    <label for="nom">nom:</label>
                    <input type="text" id="nom" name="nom" placeholder="saisisez votre nom" title="obligatoire">
                </p>
                <p>
                    <label for="prenom">prenom:</label>
                    <input type="text" id="prenom" name="prenom" placeholder="saisisez votre prenom">
                </p>
                <p>
                    <label for="age">age:</label>
                    <input type="number" id="age" name="age" placeholder="saisisez votre age" min="0" max="100">
                </p>
            </fieldset>
            <fieldset>
                <legend>Scolarité</legend>
                <p>
                    <label for="classe">classe:</label>
                    <select name="classe" id="classe">
                        <option value="seconde">seconde</option>
                        <option value="première">première</option>
                        <option value="terminal">terminal</option>
                    </select>
                </p>
                <p>
                    <label for="serie">Série:</label>
                </p>
                <p>
                    <input type="checkbox" id="S" name="S" value="S">
                    <label for="S">S</label>
                </p>
                <p>
                    <input type="checkbox" id="ES" name="ES" value="ES">
                    <label for="ES">ES</label>
                </p>
                <p>
                    <input type="checkbox" id="L" name="L" value="L">
                    <label for="L">L</label>
                </p>
                <p>
                    <input type="checkbox" id="Indeterminée" name="Indeterminée" value="Indeterminée">
                    <label for="Indeterminée">Indeterminée</label>
                </p>
                <p>
                    <input type="checkbox" id="redoublant" name="redoublant" value="redoublant">
                    <label for="redoublant">Redoublant(e)</label>
                </p>
            </fieldset>
            <fieldset>
                <legend>Orientation</legend>
                <p>qu'envisagez vous pour la suite de vos études?</p>
                <p>
                    <input type="checkbox" id="Université" name="Université" value="Université">
                    <label for="Université">Université</label> &nbsp;&nbsp;&nbsp;
                    <input type="checkbox" id="BTS" name="BTS" value="BTS">
                    <label for="BTS">BTS</label>
                </p>
                <p>
                    <input type="checkbox" id="UIT" name="UIT" value="UIT">
                    <label for="UIT">UIT</label> &nbsp;&nbsp;&nbsp;
                    <input type="checkbox" id="ecolecommerce" name="ecolecommerce" value="ecolecommerce">
                    <label for="ecolecommerce">école de ommerce</label>
                </p>
                <p>
                    <input type="checkbox" id="ecole" name="ecole" value="ecole">
                    <label for="ecole">ecole d'ingenuerie</label> 
                </p>
                <p>
                    <label for="commentaire">commentaire eventuel:</label><br>
                    <textarea name="commentaire" id="commentaire"></textarea>
                </p>
            </fieldset>
        </fieldset>
        
    </form>
</body>
</html>
